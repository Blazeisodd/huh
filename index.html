<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yeeps Background</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: Arial, sans-serif;
      color: white;
    }
    
    /* Fullscreen background image */
    body {
      background-image: url('https://static.wikia.nocookie.net/yeeps/images/a/ab/Yeeps_Player.png/revision/latest?cb=20240723065515');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    /* Dark gray blur overlay - initially visible */
    #blurOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(40, 40, 40, 0.95); /* Dark gray tint */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out;
    }
    
    /* Hide overlay when clicked */
    #blurOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    #clickMeBtn {
      padding: 15px 30px;
      font-size: 24px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: #333;
      transition: transform 0.2s;
    }
    
    #clickMeBtn:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Dark gray blur overlay with "Click Me" button -->
  <div id="blurOverlay">
    <button id="clickMeBtn">Click Me</button>
  </div>

  <script>
    const blurOverlay = document.getElementById('blurOverlay');
    const clickMeBtn = document.getElementById('clickMeBtn');

    // Remove dark gray blur overlay on click
    clickMeBtn.addEventListener('click', () => {
      blurOverlay.classList.add('hidden');
    });
  </script>
</body>
</html>
