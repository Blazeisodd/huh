<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Background + Audio</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: Arial, sans-serif;
      color: white;
    }
    
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;      
    }
    
    /* Blue blur overlay - initially visible */
    #blurOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 100, 255, 0.9); /* Blue tint */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out;
    }
    
    /* Hide overlay when clicked */
    #blurOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    #clickMeBtn {
      padding: 15px 30px;
      font-size: 24px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.9);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: #0066cc;
      transition: transform 0.2s;
    }
    
    #clickMeBtn:hover {
      transform: scale(1.05);
    }
    
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    
    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Background video -->
  <video id="bgVideo" autoplay loop muted playsinline>
    <source src="https://github.com/Blazeisodd/huh/raw/main/yeeps-animation.mp4" type="video/mp4">
  </video>

  <!-- Blue blur overlay with "Click Me" button -->
  <div id="blurOverlay">
    <button id="clickMeBtn">Click Me</button>
  </div>

  <!-- Main content (hidden until click) -->
  <div class="content">
    <h1>Welcome</h1>
    <p>If the audio didn't start, click Play.</p>
    <button id="playBtn">Play Audio at Full Volume</button>
    <audio id="bgAudio" src="https://github.com/Blazeisodd/huh/raw/main/weight.mp3"></audio>
  </div>

  <script>
    const audio = document.getElementById('bgAudio');
    const playBtn = document.getElementById('playBtn');
    const blurOverlay = document.getElementById('blurOverlay');
    const clickMeBtn = document.getElementById('clickMeBtn');

    // Remove blue blur overlay on click
    clickMeBtn.addEventListener('click', () => {
      blurOverlay.classList.add('hidden');
      
      // Try audio autoplay after interaction
      audio.volume = 1.0;
      audio.play().catch(e => console.log('Audio play failed:', e));
    });

    // Audio play button fallback
    playBtn.addEventListener('click', () => {
      audio.volume = 1.0;
      audio.play();
    });
  </script>
</body>
</html>
