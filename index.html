<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Video Background + Audio</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: Arial, sans-serif;
      color: white;
    }
    
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;      
    }
    .overlay {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
 
  <video id="bgVideo"
         autoplay
         loop
         muted
         playsinline>
    <source src="https://github.com/Blazeisodd/huh/raw/main/yeeps-animation.mp4" type="video/mp4">
  </video>

  <div class="overlay">
    <h1>Welcome</h1>
    <p>If the audio didn't start, click Play.</p>
    <button id="playBtn">Play Audio at Full Volume</button>
    <audio id="bgAudio" src="https://github.com/Blazeisodd/huh/raw/main/weight.mp3"></audio>
  </div>

  <script>
    const audio = document.getElementById('bgAudio');
    const btn = document.getElementById('playBtn');

    
    window.addEventListener('load', () => {
      audio.volume = 1.0;
      const p = audio.play();
      if (p !== undefined) {
        p.catch(() => {
          console.log('Autoplay blocked; waiting for user click');
        });
      }
    });

   
    btn.addEventListener('click', () => {
      audio.volume = 1.0;
      audio.play();
    });
  </script>
</body>
</html>
